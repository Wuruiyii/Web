<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
  <style>
    .p1{
      color: red;
    }
    .p2 {
      font-size: 18px;
    }
    .p3{
      font-family: "微软雅黑";
    }
    .p4{
      font-weight: bold;
    }
    .p5{
      font-style: italic;
    }
    .p6{
      color: blue;
    }
    .p7{
      font-variant: small-caps;
    }
    .p8
    {
      font: italic small-caps bold 20px/40px "可爱字体";
    }
    @font-face {
        font-family: "可爱字体";
        src:url("Dymon-ShouXieTi.otf");
    }
  </style>
</head>
<body>
<p class="p1">我是默认的字体，设置为红色</p>
<p class="p2">我是设置18像素的字号哦</p>
<p class="p3">我是设置为微软雅黑的字体</p>
<p class="p4">我是设置为加粗的字体</p>
<p class="p5">我是设置为倾斜的字体</p>
<p class="p6">我是小写字liao cheng da xue,设置为蓝色</p>
<p class="p7">我是设置为大写的小写字母：liao cheng da xue</p>
<p class="p8">我是综合以上属性的字体：liao cheng da xue</p>
</body>
</html>
