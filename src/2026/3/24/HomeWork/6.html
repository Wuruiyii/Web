<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>案例6</title>
  <style>
    body {
        font-size: 14px;
        font-family: "宋体";
        line-height: 18px;
    }
    #title {
      font-size: 18px;
      color: purple;
      font-weight: bold;
      text-align: center;
    }
    .first {
      color: red;
      text-align: center;
    }
    .sec {
      color: blue;
      text-indent: 2em;
      letter-spacing: 16px;
    }
    .tir {
        color: green;
        font-weight: bold;
        font-style:italic;
    }
    .four {
        color: purple;
        text-decoration: line-through;
    }
  </style>
</head>
<body>
     <h1 id="title">朋友</h1>
    <p class="first">这些年一个人 风也过雨也走 有过泪有过错 还记得坚持甚麽 真爱过才会懂 会寂寞会回首 终有梦终有你在心中</p>
    <p class="sec">朋友一生一起走 那些日子不再有 一句话一辈子  一生情一杯酒</p>
    <p class="tir">朋友不曾孤单过 一声朋友你会懂 还有伤还有痛  还要走还有我</p>
    <p class="four">这些年一个人 风也过雨也走 有过泪有过错 还记得坚持甚麽</p>
</body>
</html>
