<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>案例5</title>
    <style>
        h2 {
            text-align: center;
        }

        hr.line1 {
            border: none;
            background-color: #1E8DC2;
            width: 70%;
            height: 3px;
            margin-left: 0;
        }

        hr.line2 {
            border: none;
            background-color: rgba(128, 128, 128, 0.4);
            height: 3px;
        }

        .movie {
            overflow: hidden;
        }

        .movie-info1 {
            float: left;
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .movie-info2 {
            float: left;
            height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .movie-info1 p {
            margin: 0;
        }

        .movie-info2 p {
            margin: 0;
        }

        .movie-post1 {
            float: right;
            height: 200px;
        }

        .movie-post2 {
            float: right;
            height: 220px;
            margin-right: 50px;
        }
    </style>
</head>

<body>
<h2>疯狂动物城</h2>
<hr class="line1">
<div class="movie">
    <div class="movie-info1">
        <p>2016年3月4日</p>
        <p>导演：拜伦·霍华德&ensp;/&ensp;瑞奇·摩尔&ensp;/&ensp;杰拉德·布什</p>
        <p>主演：金妮弗·古德温&ensp;/&ensp;杰森·贝特曼&ensp;/&ensp;伊德里斯·艾尔巴</p>
        <p>片长：109分钟</p>
        <p>类型：喜剧/动作/动画/冒险</p>
        <p>定价：<del>50</del>&emsp;&ensp;28</p>
    </div>
    <img src="img/fkdwc.jpg" class="movie-post1" />
</div>

<h2>叶问3</h2>
<hr class="line2">
<div class="movie">
    <div class="movie-info2">
        <p>导演：叶伟信</p>
        <p>主演：甄子丹&ensp;/&ensp;迈克·泰森&ensp;/&ensp;张晋&ensp;/&ensp;熊黛林&ensp;/&ensp;谭耀文</p>
        <p>片长：105分钟</p>
        <p>类型：剧情/动作/传记/历史</p>
        <p>定价：<del>50</del>&emsp;&ensp;25</p>
        <p><ins>上映日期：2016年3月4日</ins></p>
    </div>
    <img src="img/yw3.jpg" class="movie-post2" />
</div>
</body>
</html>
