<h2>如何培养<span style="color:#076BBC">认真严谨</span>的习惯</h2>
<p class="center">时间: <span class="s">2022年02月21日17时26分</span> 来源: <span class="s">思政教育</span></p>
<img src="222.jpg" alt="" align="left" vspace="10px" hspace="30px">
<p>♠ <span class="red">反复确认</span>，做任何事情都要照顾到每一个细节并反复确认，<span class="red">要有一种能在脑子里“虚拟”整个事件过程的能力</span>，确保所有的节点都正常。</p>
<p>♠ 想尽办法<span class="red">努力让不可能变为可能</span>只有用尽全力做了，才算是努力.</p>
<p>♠ 结果导向<span class="red">一切以结果为导向，任何事情都是你的名片</span>。还要思考你的结果和过程是否满足所有和你配合的人的需求，</p>
<p>♠ 学会假设<span class="red">了解周围比你强的人，观察他们的做事方法</span>。遇到让自己束手无策的时候，把自己虚拟成他的样子，想想他会怎么做。</p>
