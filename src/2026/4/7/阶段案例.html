<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>阶段案例</title>
    <style>
      .bg{
          width:500px;
          height: 500px;
          background-color: black;
          border: 5px solid darkgrey;
          border-radius: 50%;
          background-image:repeating-radial-gradient(circle at 50% 50%,#333,#000 1%);
      }
       .f {
           margin-left: 114px;
           margin-top: 50px;
           width: 270px;
           height: 400px;
           background: url("images/yinyue.jpg") no-repeat 45px 25px,
           url("images/wenzi.jpg") no-repeat center;
           background-size: 180px auto, 150px auto;
           border-radius: 15px;
           background-color: white;
           border: 1px solid ;
           box-shadow: 1px 2px 5px 5px;
       }
      .c {
          width: 270px;
          margin-top: 225px;
          border-radius: 0 0 15px 15px;
          text-align: center;
      }
      p{
          background: url("images/yinfu.png")  no-repeat 44px center;
          background-color: #514d58;
          color: white;
          font-size: 15px;
          line-height: 35px;
          margin: 1px auto;
          padding: 0px;
      }
      .border{
          border-radius: 0 0 15px 15px;
      }
    </style>
</head>
<body>
<div class="bg">
<div class="f">
    <div class="c">
        <p>vnessa-constance</p>
        <p>dogffedrd-seeirtit</p>
        <p>dsieirif-constance</p>
        <p>wytuu-qeyounted</p>
        <p class="border">qurested-conoted</p>
</div>
</div>
</div>
</body>
</html>
