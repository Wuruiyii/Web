<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>锚点</title>
</head>
<body>
<!--如果想要设置顶部锚点，应当在最外侧包裹一个div作为顶部边界-->
<!--超链接连接的是对应的id标签-->
<!--插入的图片所在的位置设置id值-->
<div id="top">
    <a href="#1lou">1楼</a>
    <a href="#2lou">2楼</a>
    <a href="#3lou">3楼</a>
    <div id="1lou"><image src="images/01.jpg"></image></div>
    <a href="#top">顶部</a>
    <div id="2lou"><image src="images/02.jpg"></image></div>
    <a href="#top">顶部</a>
    <div id="3lou"><image src="images/03.jpg"></image></div>
</div>

</body>
</html>
