<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>case3</title>
  <style>
      *{
          margin: 0px;
          padding: 0px;
          border: 0px;
      }
    ol{
        width: 300px;
        height: 200px;
        margin: 20px auto;
        border: 1px solid #f1f1f1;
        list-style-position: inside;
    }
    ol li{
        width: 290px;
        height: 30px;
        color: #519B9F;
        padding: 10px 0 0 10px;
        background: url("images/up.jpg") no-repeat 170px 14px;
    }
    .one{
       background: url("images/down.jpg") no-repeat 170px 14px #F3F3F3;
    }
  </style>
</head>
<body>
<ol>
    <li>桥边姑娘</li>
    <li class="one">大鱼</li>
    <li>演员</li>
    <li class="one">逆流成河</li>
    <li>记忆里的雪</li>
</ol>
</body>
</html>
