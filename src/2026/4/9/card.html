<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Card</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            border: 0px;
        }
        body{
            font-size: 12px;
            line-height: 24px;
        }
        .box{
            width: 580px;
            background-color: #c2fde3;
            margin: 20px auto;
            padding: 20px;
            height:200px;
        }
        .box dt
        {
            float: left;
            margin-right: 20px;
        }
        .box dd h2,h3{
            line-height: 25px;
            margin-top: 10px;
        }
        .box dd h2 span{
            color: #669800;
        }
          .box dd p
          {
              margin-top: 20px;
              font-size: 16px;
              line-height: 30px;
          }

    </style>
</head>
<body>
<dl class="box">
    <dt><img src="images/zhangpeng.jpg" alt=""></dt>
    <dd>
        <h2><span>张鹏</span></h2>
        <h3>清华大学计算机系1998级本科、2018级创新领军工程博士</h3>
        <p>现任北京智谱华章科技有限公司（简称“智谱AI”）的首席执行官,他于1998年进入清华大学，开始他的学术生涯，并在2002年获得硕士学位后继续攻读博士学位。</p>
    </dd>
</dl>
</body>
</html>
