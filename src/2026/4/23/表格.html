<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>表格</title>
    <style>
        table{
            width: 400px;
            height: 200px;
        }
    </style>
</head>
<body>
<table border="1px" background="image/bg.gif">
    <tr>
        <td background="image/flower.jpg" height="290px" width="290px"></td>
        <td>我是第一行第二列</td>
    </tr>
    <tr>
        <td>我是第二行第一列</td>
        <td>我是第二行第二列</td>
    </tr>

</table>
</body>
</html>
