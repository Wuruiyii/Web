<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
  <style>
    body
    {
      font-size: 18px;
      background: url("images/timg.jpg") no-repeat top center;
      color: #FFF;
      font-family: "微软雅黑";
    }
    form,p,input
    {
      margin: 0px;
      padding: 0px;
      border: 0px
    }
    span{
      display: inline-block;
      width: 320px;
      height: 50px;
      line-height: 50px;
      padding-left: 60px;
      margin-top: 100px;
    }
    .a{
      margin-top: 0px;
    }
    .center
    {
      width: 400px;
      height: 350px;
      margin: 150px auto;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      border: 2px solid rgba(255, 255, 255, 0.36);
    }
    .one
    {
      background: url("images/3.png") no-repeat left center;
      padding-left: 20px;
      color: white;
    }
    .two
    {
      background: url("images/4.png") no-repeat left center;
      padding-left: 20px;
      color: white;
    }
    input{
      border: 1px solid #c5c3c3;
      height: 30px;
      width: 200px;
      border-radius: 5px;

    }
    button{
      margin-left: 115px;
      width: 220px;
      background: #c2fdf6;
      border: none;
      border-radius: 5px;
      height: 30px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
<form action="">
<div class="center">
  <span>账号：<input type="text" class="one"></span> <br>
  <span class="a">密码：<input type="text" class="two"></span> <br>
  <button>登录</button>
</div>
</form>
</body>
</html>
